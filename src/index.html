<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>MCBrowser</title>
  <link rel="stylesheet" href="style.css">
</head>
<!-- 初期状態でテーマクラスとフォントサイズクラスを付与しておきます -->
<body class="theme-dark chrome-tabs font-medium">

  <!-- ブラウザ全体の最背面に表示する壁紙画像用コンテナ -->
  <div id="browser-bg"></div>

  <!-- ブラウザのヘッダー領域 -->
  <header id="browser-header">
    
    <!-- ウィンドウをドラッグして移動させるための透明なエリア（最背面に配置） -->
    <div id="window-drag-area"></div>

    <!-- 上段：タブバー ＆ アプリ操作ボタン -->
    <div class="header-top-row">
      <!-- タブコンテナ -->
      <div id="tabs-container" class="no-drag">
        <div id="tabs">
          <!-- renderer.js から動的にタブ要素が追加されます -->
        </div>
        <button id="newTabBtn" title="新しいタブを追加">+</button>
      </div>

      <!-- Google Chrome風のウィンドウ操作ボタン群 -->
      <div id="window-controls" class="no-drag">
        <button id="win-minimize-btn" class="win-btn" title="最小化">&#128469;&#xFE0E;</button>
        <button id="win-maximize-btn" class="win-btn" title="最大化">&#128470;&#xFE0E;</button>
        <button id="win-close-btn" class="win-btn win-btn-close" title="閉じる">&#128473;&#xFE0E;</button>
      </div>
    </div>

    <!-- 下段：ナビゲーションバー -->
    <div class="header-bottom-row no-drag">
      <div class="nav-buttons">
        <button id="backBtn" class="nav-btn" title="戻る">←</button>
        <button id="forwardBtn" class="nav-btn" title="進む">→</button>
        <button id="reloadBtn" class="nav-btn" title="再読み込み">↻</button>
        <button id="homeBtn" class="nav-btn" title="ホーム（新規タブページ）">⌂</button>
        <button id="backHistoryBtn" class="nav-btn" title="履歴">🕒</button>
      </div>

      <!-- URL入力欄 -->
      <div class="urlbar-wrapper">
        <input type="text" id="urlbar" placeholder="検索キーワードまたはURLを入力" autocomplete="off">
        <button id="bookmarkBtn" title="このページをブックマーク">★</button>
      </div>

      <div class="action-buttons">
        <button id="settingsBtn" class="nav-btn" title="設定を開く">⚙</button>
      </div>
    </div>

    <!-- ブックマークバー領域 -->
    <div id="bookmarkBar" class="no-drag">
      <!-- renderer.js から動的にブックマークが挿入されます -->
    </div>

    <!-- 履歴ポップアップ -->
    <div id="historyPopup" class="hidden no-drag"></div>

  </header>

  <!-- メインコンテンツ領域 -->
  <main id="content-area">
    <!-- メインプロセスで制御される Web コンテンツがこの位置に重なります -->
  </main>

  <!-- 設定サイドバー（右側からスライドイン） -->
  <aside id="settingsSidebar" class="no-drag">
    <div class="sidebar-header">
      <h3>ブラウザ設定</h3>
      <button id="closeSettingsBtn">✕</button>
    </div>
    
    <div class="sidebar-content">
      <div class="setting-group">
        <label>ユーザーインターフェース</label>
        <div class="setting-item">
          <input type="checkbox" id="toggleBookmarkBar" checked>
          <span>ブックマークバーを表示する</span>
        </div>
        <div class="setting-item">
          <input type="checkbox" id="toggleTabScroll" checked>
          <span>タブのスクロールバーを有効化</span>
        </div>
      </div>

      <div class="setting-group">
        <label for="searchEngine">既定の検索エンジン (12種)</label>
        <select id="searchEngine">
          <option value="google">Google</option>
          <option value="startpage">Startpage</option>
          <option value="brave">Brave Search</option>
          <option value="vivaldi">Bing (Vivaldi)</option>
          <option value="coccoc">Cốc Cốc</option>
          <option value="konqueror">Yahoo! (Konqueror)</option>
          <option value="tor">DuckDuckGo (Tor)</option>
          <option value="srware">DuckDuckGo (SRWare Iron)</option>
          <option value="firefox">Google (Firefox)</option>
          <option value="chromium">Google (Chromium)</option>
          <option value="floorp">Google (Floorp)</option>
          <option value="opera">Google (Opera)</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="themeSelect">テーマスキン</label>
        <select id="themeSelect">
          <option value="dark">ステルスダーク (推奨)</option>
          <option value="light">ライトモード</option>
        </select>
      </div>

      <div class="setting-group">
        <label for="tabShapeSelect">タブの形状デザイン</label>
        <select id="tabShapeSelect">
          <option value="chrome">Chrome風（台形モダン）</option>
          <option value="square">スクエア（シャープミニマル）</option>
        </select>
      </div>

      <!-- フォントサイズ変更の連動用セレクトボックス -->
      <div class="setting-group">
        <label for="fontSizeSelect">UIフォントサイズ</label>
        <select id="fontSizeSelect">
          <option value="small">小</option>
          <option value="medium" selected>中</option>
          <option value="large">大</option>
        </select>
      </div>

      <div class="setting-group">
        <label>ブラウザ背景スキン（透過用）</label>
        <input type="file" id="bgUpload" accept="image/*">
      </div>

      <div class="setting-group">
        <button id="resetSettingsBtn" class="danger-btn">閲覧履歴・キャッシュの初期化</button>
      </div>
    </div>
  </aside>

<script src="renderer.js" defer></script>
</body>
</html>
